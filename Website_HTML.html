<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        :root {
            --primary-color: #dc8425;
            --secondary-color: #ab2edc;
            --bg-color: #083441;
        }
        @font-face {
            font-family: Balhattan;
            src: url(fonts/Balhattan-Regular.otf);
        }
        @font-face {
            font-family: Balhattan-Italic;
            src: url(fonts/Balhattan-Italic.otf);
            font-weight: italic;
        }
        .mainDiv {
            margin: 5% 15%;
            border: #ab2edc 3px solid;
            width: 70%;
            height: 15vw;
        }
        .box {
            position: absolute;
            bottom: 10%;
            left: 2.5%;
            width: 12%;
            height: 6%;
            gap: 32px;  
            align-items: center;
        }
        .box img {
            width: 128px;
            height: auto;
            image-rendering: pixelated;
        }
        .bottom-left {
            position: absolute;
            bottom: 3%;
            left: 2.5%;
        }
        .text {
            color: var(--primary-color);
            font-size: 1.5vw;
            cursor: pointer;
            font-family: Balhattan;
            text-decoration: underline;
            :hover {
                color: var(--secondary-color);
            }
        }
        
        .floatingGif {
            position: absolute;
            width: 64px;
            pointer-events: none;
            animation: floatUp 3s ease-out forwards;
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translate(0,0) scale(1);
            }

            100% {
                opacity: 0;
                transform: translate(var(--x), var(--y)) scale(1.2);
            }
        }

    </style>

    <script>
        function copyText(text) {
            navigator.clipboard.writeText(text)
        }
        function sparkle(position, x_mod, y_mod) {
            const img = document.createElement("img");
            img.src = "images/copied.png"; // your GIF
            img.className = "floatingGif";
            img.style.width = "5vw"; // adjust size as needed
            const spawnX = position.x + x_mod+ position.width / 2 + (Math.random() - 0.5) * 320;
            const spawnY = position.y + y_mod + position.height / 2 + (Math.random() - 0.5) * 320;

            img.style.left = `${spawnX}px`;
            img.style.top = `${spawnY}px`;

            // random float direction
            const floatX = (Math.random() - 0.5) * 100 + "px";
            const floatY = -(80 + Math.random() * 100) + "px";

            img.style.setProperty("--x", floatX);
            img.style.setProperty("--y", floatY);

            document.body.appendChild(img);

            img.addEventListener("animationend", () => {
                img.remove();
            });
        };

    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body style="background-color:var(--bg-color);">
    <div class="mainDiv">
        <h1 style="color: var(--primary-color);">Hello World</h1>
    
    
    
    </div>
    <div class="box">
        <a href="https://discordapp.com/users/khile" target="_blank"><img src="images/discord.png" alt="discord"></a>
        <a href="https://odotchu.itch.io/deal-me-in" target="_blank"><img src="images/itch.png" alt="itch"></a>
        <a href="https://github.com/Khile07?tab=overview&from=2026-04-01&to=2026-04-30" target="_blank"><img src="images/github.png" alt="github"></a>
    </div>
    <div class="bottom-left text">
        <span id="sparkle" onclick="copyText('Khaleilpirmohamed07@gmail.com'); sparkle(this.getBoundingClientRect(), 300, -100);" >
            Khaleilpirmohamed07@gmail.com
        </span>
    </div>
</body>
</html>
